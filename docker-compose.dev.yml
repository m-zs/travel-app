services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DOCKER_DEV: "true"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WDS_SOCKET_HOST: 127.0.0.1
      WDS_SOCKET_PORT: "3000"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
            - coverage/
            - playwright-report/
            - test-results/
            - .git/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json
